<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer circle decoration/background -->
  <circle cx="50" cy="50" r="46" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2" />
  
  <!-- Central Community Hub symbol: 3 figures with overlapping arms/hearts -->
  <g filter="url(#shadow)">
    <!-- Person 1 (Top, blue) -->
    <circle cx="50" cy="30" r="7" fill="url(#grad1)" />
    <path d="M50 40c-6 0-11 3.5-11 9v6h22v-6c0-5.5-5-9-11-9z" fill="url(#grad1)" />
    
    <!-- Person 2 (Bottom Left, green) -->
    <circle cx="33" cy="60" r="7" fill="url(#grad2)" />
    <path d="M33 70c-6 0-11 3.5-11 9v3h22v-3c0-5.5-5-9-11-9z" fill="url(#grad2)" />
    
    <!-- Person 3 (Bottom Right, amber/orange) -->
    <circle cx="67" cy="60" r="7" fill="url(#grad3)" />
    <path d="M67 70c-6 0-11 3.5-11 9v3h22v-3c0-5.5-5-9-11-9z" fill="url(#grad3)" />
    
    <!-- Interconnecting heart/arms in center representing help/holding hands -->
    <path d="M50 48 C43 48, 38 58, 45 64 C50 69, 50 69, 50 69 C50 69, 50 69, 55 64 C62 58, 57 48, 50 48 Z" fill="#EF4444" opacity="0.9" />
  </g>
</svg>